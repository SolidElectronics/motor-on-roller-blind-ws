#[env:esp12e] # NodeMCU
#platform = espressif8266
#board = esp12e
#framework = arduino
#monitor_speed = 115200

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200

[env:d1_mini_test]
extends = env:d1_mini
upload_port = COM4
build_flags = "-D MOTOR_WIRE_1324"

[env:d1_mini_ota_bsmt-1] 
extends = env:d1_mini
upload_protocol = espota
upload_port = 192.168.11.157
build_flags = "-D MOTOR_WIRE_1324"

[env:d1_mini_ota_bsmt-2] 
extends = env:d1_mini
upload_protocol = espota
upload_port = 192.168.11.155
build_flags = "-D MOTOR_WIRE_1324"